name: Daily Finance Sync

on:
  schedule:
    # 6:00 AM Panama (GMT-5) = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days to look back (overrides automatic calculation)'
        required: false
        type: number

jobs:
  # ── 1. Sync emails from Gmail → Supabase ──────────────────────────────────
  sync-emails:
    name: Sync Emails
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run email sync
        env:
          GOOGLE_CLOUD_PROJECT: mail-reader-433802
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days }}
        run: npx tsx scripts/production/sync-emails-daily.ts

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: '*.log'
          retention-days: 7

  # ── 2. Send push notifications for pending payments ───────────────────────
  send-notifications:
    name: Send Payment Notifications
    runs-on: ubuntu-latest
    needs: sync-emails   # run after sync so data is fresh
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Send notifications
        env:
          GOOGLE_CLOUD_PROJECT: mail-reader-433802
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: npx tsx scripts/production/send-notifications.ts
